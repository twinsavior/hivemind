<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIVEMIND Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --text: #e0e0e8; --dim: #6b6b80; --accent: #6366f1;
      --green: #22c55e; --amber: #f59e0b; --red: #ef4444; --cyan: #06b6d4;
      --purple: #a855f7;
    }
    body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; font-size: 13px; }

    .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); }
    .header .status::before { content: ''; width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); padding: 1px; }
    .card { background: var(--surface); padding: 20px; }
    .card h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 12px; }

    .metric { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; }
    .metric .label { color: var(--dim); }
    .metric .value { font-size: 20px; font-weight: 700; }
    .metric .value.green { color: var(--green); }
    .metric .value.amber { color: var(--amber); }
    .metric .value.cyan { color: var(--cyan); }
    .metric .value.purple { color: var(--purple); }

    .agents-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); margin-top: 1px; padding: 1px; }
    .agent { background: var(--surface); padding: 16px; }
    .agent .name { font-weight: 600; margin-bottom: 4px; }
    .agent .role { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .agent .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
    .badge.active { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge.idle { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.error { background: rgba(239,68,68,0.15); color: var(--red); }
    .agent .skills { margin-top: 8px; font-size: 11px; color: var(--dim); }
    .agent .tasks { margin-top: 4px; font-size: 12px; color: var(--cyan); font-weight: 600; }

    .feed { background: var(--surface); margin-top: 1px; }
    .feed-header { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: center; }
    .feed-header h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); }
    .feed-header .live { display: flex; align-items: center; gap: 6px; color: var(--red); font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .feed-header .live::before { content: ''; width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: pulse 1s infinite; }

    .events { max-height: 300px; overflow-y: auto; padding: 0 20px 16px; }
    .event { padding: 8px 0; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 100px 120px 1fr 80px; gap: 12px; align-items: center; font-size: 12px; }
    .event .time { color: var(--dim); font-size: 11px; }
    .event .agent-name { color: var(--accent); font-weight: 600; }
    .event .detail { color: var(--text); }
    .event .status-badge { text-align: right; }
    .event .status-badge span { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .event .status-badge .completed { background: rgba(34,197,94,0.15); color: var(--green); }
    .event .status-badge .started { background: rgba(99,102,241,0.15); color: var(--accent); }
    .event .status-badge .failed { background: rgba(239,68,68,0.15); color: var(--red); }

    .footer { padding: 12px 24px; border-top: 1px solid var(--border); font-size: 11px; color: var(--dim); display: flex; justify-content: space-between; }

    .events::-webkit-scrollbar { width: 4px; }
    .events::-webkit-scrollbar-track { background: transparent; }
    .events::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>HIVEMIND</h1>
    <div class="status" id="connection-status">Connected</div>
    <div style="flex:1"></div>
    <div style="color: var(--dim); font-size: 11px;" id="uptime">Uptime: 0s</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Swarm Overview</h2>
      <div class="metric"><span class="label">Total Agents</span><span class="value cyan" id="total-agents">0</span></div>
      <div class="metric"><span class="label">Active Agents</span><span class="value green" id="active-agents">0</span></div>
      <div class="metric"><span class="label">Active Tasks</span><span class="value amber" id="active-tasks">0</span></div>
    </div>
    <div class="card">
      <h2>Performance</h2>
      <div class="metric"><span class="label">Tasks Completed</span><span class="value green" id="completed-tasks">0</span></div>
      <div class="metric"><span class="label">Tasks Failed</span><span class="value" style="color:var(--red)" id="failed-tasks">0</span></div>
      <div class="metric"><span class="label">Success Rate</span><span class="value purple" id="success-rate">--</span></div>
    </div>
    <div class="card">
      <h2>Resources</h2>
      <div class="metric"><span class="label">Memory Usage</span><span class="value cyan" id="memory-usage">0 MB</span></div>
      <div class="metric"><span class="label">Messages/sec</span><span class="value" id="msg-rate">0</span></div>
      <div class="metric"><span class="label">Uptime</span><span class="value" id="uptime-val">0s</span></div>
    </div>
  </div>

  <div class="agents-grid" id="agents-container"></div>

  <div class="task-input" style="margin-top: 1px; background: var(--surface); padding: 16px 20px;">
    <h2 style="font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 10px;">Submit Task</h2>
    <form id="task-form" style="display: flex; gap: 8px;">
      <input id="task-desc" type="text" placeholder="Describe your task... (e.g. 'Research the top AI agent frameworks')"
        style="flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-family: inherit; font-size: 13px; outline: none;"
        autocomplete="off" />
      <select id="task-agent" style="background: var(--bg); border: 1px solid var(--border); color: var(--dim); padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 12px;">
        <option value="">Auto-assign</option>
        <option value="scout-1">Scout Alpha</option>
        <option value="builder-1">Builder Prime</option>
        <option value="sentinel-1">Sentinel Watch</option>
        <option value="oracle-1">Oracle Insight</option>
        <option value="courier-1">Courier Express</option>
      </select>
      <button type="submit" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;">
        Run
      </button>
    </form>
    <div id="task-status" style="margin-top: 8px; font-size: 12px; color: var(--dim); display: none;"></div>
    <div id="task-result" style="margin-top: 10px; display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6;"></div>
  </div>

  <div class="feed">
    <div class="feed-header">
      <h2>Task Feed</h2>
      <div class="live">Live</div>
    </div>
    <div class="events" id="events-container"></div>
  </div>

  <div class="footer">
    <span>HIVEMIND v1.0.0 - The Open-Source Autonomous Agent Swarm</span>
    <span id="event-count">0 events</span>
  </div>

  <script>
    const agents = new Map();
    const events = [];
    let metrics = {};
    const startTime = Date.now();

    // WebSocket connection
    const wsUrl = `ws://${location.host}/ws`;
    let ws;

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        document.getElementById('connection-status').textContent = 'Connected';
        document.getElementById('connection-status').style.color = 'var(--green)';
      };
      ws.onclose = () => {
        document.getElementById('connection-status').textContent = 'Reconnecting...';
        document.getElementById('connection-status').style.color = 'var(--amber)';
        setTimeout(connect, 2000);
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch (msg.type) {
          case 'agent:update':
          case 'agent:added':
            agents.set(msg.payload.id, msg.payload);
            renderAgents();
            break;
          case 'agent:removed':
            agents.delete(msg.payload.id);
            renderAgents();
            break;
          case 'swarm:metrics':
            metrics = msg.payload;
            renderMetrics();
            break;
          case 'task:event':
            events.unshift(msg.payload);
            if (events.length > 100) events.pop();
            renderEvents();
            break;
        }
      };
    }
    connect();

    function renderMetrics() {
      document.getElementById('total-agents').textContent = metrics.totalAgents || 0;
      document.getElementById('active-agents').textContent = metrics.activeAgents || 0;
      document.getElementById('active-tasks').textContent = metrics.activeTasks || 0;
      document.getElementById('completed-tasks').textContent = metrics.completedTasks || 0;
      document.getElementById('failed-tasks').textContent = metrics.failedTasks || 0;
      const total = (metrics.completedTasks || 0) + (metrics.failedTasks || 0);
      document.getElementById('success-rate').textContent = total > 0
        ? Math.round((metrics.completedTasks / total) * 100) + '%' : '--';
      document.getElementById('memory-usage').textContent = (metrics.totalMemoryMB || 0) + ' MB';
      document.getElementById('msg-rate').textContent = metrics.messagesPerSecond || 0;
      document.getElementById('uptime-val').textContent = formatDuration(metrics.uptimeSeconds || 0);
    }

    // Safely create a text element (prevents XSS)
    function safeEl(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function renderAgents() {
      const container = document.getElementById('agents-container');
      container.innerHTML = '';
      for (const [id, agent] of agents) {
        const el = document.createElement('div');
        el.className = 'agent';
        el.appendChild(safeEl('div', 'name', agent.name));
        el.appendChild(safeEl('div', 'role', agent.type));
        const badge = safeEl('span', 'badge', agent.status);
        const validStatuses = ['active', 'idle', 'error', 'spawning'];
        if (validStatuses.includes(agent.status)) badge.classList.add(agent.status);
        el.appendChild(badge);
        el.appendChild(safeEl('div', 'skills', agent.skills.join(' / ')));
        el.appendChild(safeEl('div', 'tasks', agent.tasksCompleted + ' tasks completed'));
        container.appendChild(el);
      }
    }

    function renderEvents() {
      const container = document.getElementById('events-container');
      container.innerHTML = '';
      for (const evt of events.slice(0, 50)) {
        const el = document.createElement('div');
        el.className = 'event';
        el.appendChild(safeEl('span', 'time', new Date(evt.timestamp).toLocaleTimeString()));
        el.appendChild(safeEl('span', 'agent-name', evt.agentName));
        const detail = evt.detail ? evt.detail.slice(0, 60) + (evt.detail.length > 60 ? '...' : '') : '';
        el.appendChild(safeEl('span', 'detail', evt.action + ': ' + detail));
        const statusBadge = safeEl('span', 'status-badge', '');
        const validStatuses = ['completed', 'started', 'failed', 'delegated'];
        const inner = safeEl('span', '', evt.status);
        if (validStatuses.includes(evt.status)) inner.className = evt.status;
        statusBadge.appendChild(inner);
        el.appendChild(statusBadge);
        container.appendChild(el);
      }
      document.getElementById('event-count').textContent = `${events.length} events`;
    }

    function formatDuration(seconds) {
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
      return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
    }

    // Update uptime display
    setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      document.getElementById('uptime').textContent = 'Uptime: ' + formatDuration(elapsed);
    }, 1000);

    // Task submission
    document.getElementById('task-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const desc = document.getElementById('task-desc').value.trim();
      if (!desc) return;

      const agentId = document.getElementById('task-agent').value || undefined;
      const statusEl = document.getElementById('task-status');
      const resultEl = document.getElementById('task-result');
      const btn = e.target.querySelector('button');

      statusEl.style.display = 'block';
      statusEl.style.color = 'var(--amber)';
      statusEl.textContent = 'Thinking...';
      resultEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '...';

      try {
        const res = await fetch('/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description: desc, agentId }),
        });

        const data = await res.json();

        if (!res.ok) {
          statusEl.style.color = 'var(--red)';
          statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
        } else {
          statusEl.style.color = 'var(--green)';
          statusEl.textContent = `Completed by ${data.agent || 'agent'} (confidence: ${Math.round((data.confidence || 0) * 100)}%)`;
          resultEl.style.display = 'block';
          resultEl.textContent = typeof data.output === 'string' ? data.output : JSON.stringify(data, null, 2);
        }
      } catch (err) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = 'Error: ' + err.message;
      }

      btn.disabled = false;
      btn.textContent = 'Run';
      document.getElementById('task-desc').value = '';
    });
  </script>
</body>
</html>
