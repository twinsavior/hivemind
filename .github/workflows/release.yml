name: Release Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            build-cmd: npm run build:mac
          - platform: windows
            os: windows-latest
            build-cmd: npm run build:win

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install server dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build server (TypeScript)
        run: pnpm build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop/dist-electron/*.dmg
            desktop/dist-electron/*.zip
            desktop/dist-electron/*.exe
            desktop/dist-electron/*.yml
            desktop/dist-electron/*.blockmap
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          body: |
            ## HIVEMIND ${{ github.ref_name }}

            Download the desktop app below:
            - **macOS**: Download the `.dmg` file, open it, drag HIVEMIND to Applications
            - **Windows**: Download the `.exe` installer, run it

            ### Prerequisites
            - [Node.js 22+](https://nodejs.org/)
            - [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code): `npm install -g @anthropic-ai/claude-code`
