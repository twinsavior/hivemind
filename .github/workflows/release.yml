name: Release Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            build-cmd: npm run build:mac
          - platform: windows
            os: windows-latest
            build-cmd: npm run build:win

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install server dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build server (TypeScript)
        run: pnpm build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Create server runtime dependencies
        run: |
          mkdir -p desktop/server-deps
          cp package.json desktop/server-deps/
          cd desktop/server-deps
          npm install --omit=dev
          npm rebuild better-sqlite3

      - name: Build desktop app
        working-directory: desktop
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish GitHub Release
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Publish electron-builder draft release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Find the draft release created by electron-builder for this tag
            const draft = releases.find(r => r.tag_name === tag && r.draft);
            if (!draft) {
              console.log('No draft release found for tag ' + tag + '. It may already be published.');
              return;
            }

            const isPrerelease = tag.includes('beta') || tag.includes('alpha');

            // Publish it (set draft=false) and update the body
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
              prerelease: isPrerelease,
              name: tag,
              body: `## HIVEMIND ${tag}\n\nDownload the desktop app below:\n- **macOS**: Download the \`.dmg\` file, open it, drag HIVEMIND to Applications\n- **Windows**: Download the \`.exe\` installer, run it\n\n### Prerequisites\n- [Node.js 22+](https://nodejs.org/)\n- [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code): \`npm install -g @anthropic-ai/claude-code\``,
            });

            console.log('Published release ' + tag + ' (id: ' + draft.id + ') with ' + draft.assets.length + ' assets');
